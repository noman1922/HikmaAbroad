version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017/HikmaAbroad
      - JWT_SECRET=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mongo
    volumes:
      - uploads:/app/wwwroot/uploads

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  mongodata:
  uploads:
